name: Build & publish Docker images

on:
  push:
    branches: [main]
    paths:
      - "phpantom/Dockerfile"
  schedule:
    - cron: "0 3 * * 1"   # every Monday at 03:00 UTC (picks up upstream changes)
  workflow_dispatch:        # manual trigger

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: phpantom
            context: ./phpantom

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          DATE=$(date -u +%Y-%m-%d)
          SHORT_SHA=${GITHUB_SHA::7}
          IMAGE=${{ env.REGISTRY }}/${{ github.repository_owner }}/php-lsp-docker-claude-code/${{ matrix.image }}
          echo "tags=${IMAGE}:latest,${IMAGE}:${DATE},${IMAGE}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
