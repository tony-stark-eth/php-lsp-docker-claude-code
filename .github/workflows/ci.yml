name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          for f in \
            .claude-plugin/marketplace.json \
            intelephense/.lsp.json intelephense/plugin.json intelephense/hooks/hooks.json \
            phpantom/.lsp.json phpantom/plugin.json phpantom/hooks/hooks.json \
            combined/.lsp.json combined/plugin.json combined/hooks/hooks.json; do
            echo "Checking $f..."
            python3 -m json.tool "$f" > /dev/null
          done
          echo "All JSON files valid"

      - name: Check required files exist
        run: |
          for plugin in intelephense phpantom combined; do
            test -f "$plugin/.lsp.json"     || (echo "Missing $plugin/.lsp.json" && exit 1)
            test -f "$plugin/plugin.json"   || (echo "Missing $plugin/plugin.json" && exit 1)
            test -f "$plugin/hooks/hooks.json" || (echo "Missing $plugin/hooks/hooks.json" && exit 1)
            test -f "$plugin/bin/lsp-server.sh" || (echo "Missing $plugin/bin/lsp-server.sh" && exit 1)
          done
          echo "All required files present"

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"

  build-and-smoke-test:
    name: Build images & LSP smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build images (GHA layer cache so Rust compilation is skipped on repeat runs)

      - name: Build Intelephense image
        uses: docker/build-push-action@v6
        with:
          context: ./intelephense
          tags: claude-code-lsp-intelephense
          load: true
          cache-from: type=gha,scope=intelephense
          cache-to: type=gha,scope=intelephense,mode=max

      - name: Build PHPantom image
        uses: docker/build-push-action@v6
        with:
          context: ./phpantom
          tags: claude-code-lsp-phpantom
          load: true
          cache-from: type=gha,scope=phpantom
          cache-to: type=gha,scope=phpantom,mode=max

      # ── LSP smoke tests ─────────────────────────────────────────────────────
      # Send a minimal LSP initialize request and assert we get a valid response.
      # The helper script writes Content-Length framed JSON to stdin, reads the
      # response, and exits non-zero if it doesn't look like a proper result.

      - name: Smoke test — Intelephense initialize
        run: python3 .github/scripts/lsp_smoke_test.py intelephense

      - name: Smoke test — PHPantom initialize
        run: python3 .github/scripts/lsp_smoke_test.py phpantom

      - name: Smoke test — combined multiplexer initialize
        run: python3 .github/scripts/lsp_smoke_test.py combined

      # ── Functional tests ─────────────────────────────────────────────────────
      # Open a real PHP file, request completions at $greeter-> and hover on
      # the Greeter class, then assert the servers return meaningful results.

      - name: Functional test — Intelephense (completion + hover)
        run: python3 .github/scripts/lsp_functional_test.py intelephense
        timeout-minutes: 3

      - name: Functional test — PHPantom (completion + hover)
        run: python3 .github/scripts/lsp_functional_test.py phpantom
        timeout-minutes: 2

      - name: Functional test — combined (completion + hover)
        run: python3 .github/scripts/lsp_functional_test.py combined
        timeout-minutes: 3
