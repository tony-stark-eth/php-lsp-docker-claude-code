name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          for f in \
            .claude-plugin/marketplace.json \
            phpantom/.lsp.json phpantom/plugin.json phpantom/hooks/hooks.json; do
            echo "Checking $f..."
            python3 -m json.tool "$f" > /dev/null
          done
          echo "All JSON files valid"

      - name: Check required files exist
        run: |
          for plugin in phpantom; do
            test -f "$plugin/.lsp.json"         || (echo "Missing $plugin/.lsp.json" && exit 1)
            test -f "$plugin/plugin.json"       || (echo "Missing $plugin/plugin.json" && exit 1)
            test -f "$plugin/hooks/hooks.json"  || (echo "Missing $plugin/hooks/hooks.json" && exit 1)
            test -f "$plugin/bin/lsp-server.sh" || (echo "Missing $plugin/bin/lsp-server.sh" && exit 1)
          done
          echo "All required files present"

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"

  build-and-smoke-test:
    name: Build image & LSP smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build PHPantom image
        uses: docker/build-push-action@v6
        with:
          context: ./phpantom
          tags: claude-code-lsp-phpantom
          load: true
          cache-from: type=gha,scope=phpantom
          cache-to: type=gha,scope=phpantom,mode=max

      - name: Smoke test — PHPantom initialize
        run: python3 .github/scripts/lsp_smoke_test.py phpantom

      - name: Functional test — PHPantom (completion + hover + implementation)
        run: python3 .github/scripts/lsp_functional_test.py phpantom
